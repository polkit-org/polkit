---
# vi: ts=2 sw=2 et

name: AI Issue Triage
on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      contains(github.event.comment.body, '@ai-triage') &&
      contains(fromJSON('["MEMBER","OWNER","COLLABORATOR"]'), github.event.comment.author_association)
    steps:
      - name: Repository checkout
        uses: actions/checkout@v6

      - name: Generate app token for skills repo
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SKILLREPO_TOKEN_APP_ID }}
          private-key: ${{ secrets.SKILLREPO_TOKEN_APP_PRIVATE_KEY }}
          owner: polkit-org
          repositories: polkit-ai-reproducer-tools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run AI issue triage
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKILLS_REPO_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python .github/scripts/ai_issue_triage.py \
            --repo "${{ github.repository }}" \
            --issue-number "${{ github.event.issue.number }}" \
            --debug
